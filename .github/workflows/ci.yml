name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - run: bun install --frozen-lockfile
      - run: bun --filter @betterchat/web test
      - run: bun --filter @betterchat/backend test

  integration-tests:
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests]
    env:
      COMPOSE_TOOL: "docker compose"
      BETTERCHAT_TEST_ROCKETCHAT_LICENSE: ${{ secrets.ROCKETCHAT_TEST_LICENSE }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"
      - run: bun install --frozen-lockfile
      - run: bash scripts/backend-stack-start.sh
      - run: bash scripts/backend-integration-test.sh
      - if: always()
        run: bash scripts/backend-stack-stop.sh
